<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Omni Group</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .card img {
      display: block;
      margin: 0 auto 1.25rem;
      width: 90px;
      height: auto;
    }

    .card h1 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card .subtitle {
      text-align: center;
      font-size: 0.84rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .error-msg {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.84rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.35rem;
    }

    input[type="password"] {
      width: 100%;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #6366f1; }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #4f46e5; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.84rem;
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { color: #4f46e5; }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #bbb;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="/static/logo.png" alt="Omni Group" />
  <h1>Reset Password</h1>

  {% if not token %}
    <p class="subtitle">Link invalid or expired</p>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <a href="/forgot-password" class="back-link">Request a new reset link</a>
  {% else %}
    <p class="subtitle">Choose a new password for your account.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}" />

      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password"
             autocomplete="new-password" autofocus required minlength="8"
             placeholder="At least 8 characters" />

      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             autocomplete="new-password" required minlength="8"
             placeholder="Repeat your new password" />

      <button type="submit">Set New Password</button>
    </form>

    <a href="/login" class="back-link">&#8592; Back to Sign In</a>
  {% endif %}

  <div class="footer">OMNI Group L.L.C-FZ &copy; 2026</div>
</div>

</body>
</html>
